<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: #56416d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      background-color: #fff;
      border-radius: 20px;
      overflow: hidden;
      width: 90%;
      max-width: 1000px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .left-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      max-height: 550px;
    }

    .left-panel {
      flex: 1;
      background-color: #eee;
    }

    .right-panel {
      flex: 1;
      padding: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fff;
    }

    .login-box {
      width: 100%;
      max-width: 350px;
    }

    .login-box h2 {
      font-size: 28px;
      color: #3c2a4d;
      margin-bottom: 10px;
    }

    .login-box p {
      color: #7e6c90;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #3c2a4d;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #d8a367;
      font-size: 18px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1px solid #ffd9b3;
      border-radius: 8px;
      background-color: #fffdfb;
      color: #333;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #56416d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background-color: #45335a;
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      color: #7e6c90;
    }

    .signup-link a {
      color: #56416d;
      text-decoration: none;
      font-weight: 600;
    }
    header {
      background-color: #56416d;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 40px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <img src="https://images.unsplash.com/photo-1529070538774-1843cb3265df?auto=format&fit=crop&w=1000&q=80" alt="Group Study Image" />
    </div>
    <div class="right-panel">
      <div class="login-box">
        <h2>Welcome Back!</h2>
        <p>Sign in to access your dashboard</p>

        <form method="POST" action="/login">
          <label for="email">Email Address</label>
          <div class="input-group">
            <span class="icon">📧</span>
            <input type="email" id="email" name="email" placeholder="Enter your email" required />
          </div>
        
          <label for="password">Password</label>
          <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
          </div>
        
          <button type="submit">Sign In</button>
        </form>
        

        <p class="signup-link">Don't have an account? <a href="/signup">Sign up</a></p>
      </div>
    </div>
  </div>
</body>
</html>
