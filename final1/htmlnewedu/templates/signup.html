<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: #59416b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      background-color: white;
      border-radius: 20px;
      overflow: hidden;
      max-width: 1100px;
      width: 90%;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .left-panel {
      flex: 1;
    }

    .left-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .right-panel {
      flex: 1;
      padding: 50px;
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-box {
      width: 100%;
      max-width: 400px;
    }

    .form-box h2 {
      font-size: 28px;
      color: #3d2a4e;
      margin-bottom: 10px;
    }

    .form-box p {
      color: #7f6c91;
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #3d2a4e;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #c292b8;
    }

    .input-group input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1px solid #f5d9ed;
      border-radius: 8px;
      background-color: #fefcfe;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #59416b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background-color: #453256;
    }

    button .icon {
      margin-right: 8px;
      font-size: 18px;
    }

    .signin-link {
      text-align: center;
      margin-top: 20px;
      color: #7f6c91;
      font-size: 14px;
    }

    .signin-link a {
      color: #59416b;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Panel (Image) -->
    <div class="left-panel">
      <img src="https://images.unsplash.com/photo-1529070538774-1843cb3265df?auto=format&fit=crop&w=1000&q=80" alt="Students collaborating">
    </div>

    <!-- Right Panel (Form) -->
    <div class="right-panel">
      <div class="form-box">
        <h2>Create Account</h2>
        <p>Join us to monitor student progress</p>

        <form method="POST" action="/signup">
          <label for="email">Email Address</label>
          <div class="input-group">
            <span class="icon">📧</span>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
          </div>

          <label for="password">Password</label>
          <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
          </div>

          <label for="confirm">Confirm Password</label>
          <div class="input-group">
            <span class="icon">🔁</span>
            <input type="password" id="confirm" name="confirm_password" placeholder="Confirm your password" required>
          </div>

          <button type="submit"><span class="icon">➕</span> Create Account</button>
        </form>

        <p class="signin-link">Already have an account? <a href="/login">Sign in</a></p>
      </div>
    </div>
  </div>
</body>
</html>
