<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <div class="max-w-4xl mx-auto my-10 bg-white rounded-xl shadow-md overflow-hidden">
    
    <!-- Gradient Header -->
    <div class="h-36 bg-gradient-to-r from-indigo-500 to-purple-500"></div>

    <!-- Profile Info -->
    <div class="p-6 pt-0 -mt-16 flex items-center space-x-6">
      <img 
        src="https://randomuser.me/api/portraits/men/75.jpg" 
        alt="Profile" 
        class="w-32 h-32 rounded-full border-4 border-white shadow-lg"
      />
      <div class="flex-1">
        <h2 class="text-2xl font-bold">John Doe</h2>
        <p class="text-gray-500">Administrator <span class="inline-block ml-2 w-2 h-2 bg-green-500 rounded-full"></span></p>

        <div class="mt-4 grid grid-cols-2 gap-4 text-sm text-gray-600">
          <div class="flex items-center space-x-2">
            <span>📧</span>
            <span>john.doe@example.com</span>
          </div>
          <div class="flex items-center space-x-2">
            <span>📚</span>
            <span>15 Years Experience</span>
          </div>
          <div class="flex items-center space-x-2">
            <span>📞</span>
            <span>+1 (555) 123-4567</span>
          </div>
          <div class="flex items-center space-x-2">
            <span>🎓</span>
            <span>Certified Education Administrator</span>
          </div>
          <div class="flex items-center space-x-2">
            <span>📍</span>
            <span>San Francisco, CA</span>
          </div>
          <div class="flex items-center space-x-2">
            <span>📅</span>
            <span>Joined January 2024</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats Section -->
    <div class="grid grid-cols-3 text-center border-t divide-x mt-6">
      <div class="py-4">
        <p class="text-indigo-600 text-xl font-bold">1,234</p>
        <p class="text-sm text-gray-600">Students Managed</p>
      </div>
      <div class="py-4">
        <p class="text-indigo-600 text-xl font-bold">98%</p>
        <p class="text-sm text-gray-600">Response Rate</p>
      </div>
      <div class="py-4">
        <p class="text-indigo-600 text-xl font-bold">45</p>
        <p class="text-sm text-gray-600">Reports Generated</p>
      </div>
    </div>

  </div>

</body>
</html>
